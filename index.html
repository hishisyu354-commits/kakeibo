<title>食費家計簿</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#ffffff; --text:#1e2330; --muted:#6b7280;
    --pos:#15a34a; --neg:#e5484d; --accent:#4f46e5; --accent-weak:#eef0fe;
    --border:#e7e9ee; --track:#eceef2; --shadow:0 1px 3px rgba(20,25,40,.06),0 1px 2px rgba(20,25,40,.04);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e1014; --card:#181b21; --text:#e8eaf0; --muted:#98a0ac;
      --pos:#3ddc84; --neg:#ff6b6f; --accent:#7c7bff; --accent-weak:#23233a;
      --border:#272c35; --track:#232832; --shadow:none;
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding-bottom:calc(76px + env(safe-area-inset-bottom));
  }
  header{
    position:sticky; top:0; z-index:10;
    background:var(--bg);
    padding:calc(env(safe-area-inset-top) + 12px) 16px 8px;
    display:flex; align-items:baseline; justify-content:space-between;
    border-bottom:1px solid var(--border);
  }
  .brand{font-weight:700; font-size:18px}
  .today-date{font-size:13px; color:var(--muted)}
  main{max-width:520px; margin:0 auto; padding:14px 14px 24px}
  section[hidden]{display:none}

  .card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; box-shadow:var(--shadow); margin-bottom:12px}
  .label{font-size:13px; color:var(--muted); font-weight:600; letter-spacing:.02em}
  .big{font-size:44px; font-weight:800; line-height:1.15; margin:2px 0 4px; letter-spacing:-.02em}
  .mid{font-size:30px; font-weight:800; line-height:1.2; margin:2px 0 2px}
  .sub{font-size:13px; color:var(--muted)}
  .hero.pos .big,.cum.pos .mid,.pos{color:var(--pos)}
  .hero.neg .big,.cum.neg .mid,.neg{color:var(--neg)}
  .zero{color:var(--muted)}
  .bar{height:8px; background:var(--track); border-radius:99px; overflow:hidden; margin-top:12px}
  .bar-fill{height:100%; background:var(--accent); border-radius:99px; transition:width .3s ease}
  .bar-fill.over{background:var(--neg)}

  form.add-form{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:12px; box-shadow:var(--shadow); margin-bottom:12px}
  .add-form .row{display:flex; gap:8px}
  .add-form .row2{display:flex; align-items:center; justify-content:space-between; margin-top:8px; gap:8px; flex-wrap:wrap}
  input{
    font:inherit; color:var(--text); background:var(--bg);
    border:1px solid var(--border); border-radius:11px; padding:12px 12px; width:100%;
  }
  input:focus{outline:none; border-color:var(--accent); background:var(--card)}
  #amt{flex:0 0 34%; font-weight:700}
  #memo{flex:1 1 auto}
  .btn-add{
    flex:0 0 auto; border:none; background:var(--accent); color:#fff; font-weight:700;
    border-radius:11px; padding:0 18px; font-size:15px; cursor:pointer;
  }
  .btn-add:active{transform:scale(.97)}
  .row2 label{font-size:13px; color:var(--muted); display:flex; align-items:center; gap:6px}
  .row2 label input{width:auto; padding:7px 9px}
  .msg{font-size:13px; color:var(--neg); min-height:1em}

  .section-title{font-size:14px; font-weight:700; color:var(--muted); margin:6px 2px 8px}
  .empty{color:var(--muted); text-align:center; padding:22px; background:var(--card); border:1px dashed var(--border); border-radius:14px}
  .empty.small{padding:12px; border:none; background:transparent; text-align:left}

  .entry{display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:11px 12px; margin-bottom:8px}
  .entry-memo{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .entry-amt{font-weight:700; white-space:nowrap}
  .del{border:none; background:var(--track); color:var(--muted); width:40px; height:40px; min-width:40px; border-radius:50%; font-size:20px; line-height:1; cursor:pointer; flex:0 0 auto}
  .del:active{background:var(--neg); color:#fff}

  details.day{background:var(--card); border:1px solid var(--border); border-radius:14px; margin-bottom:10px; overflow:hidden}
  details.day>summary{list-style:none; cursor:pointer; padding:13px 14px}
  details.day>summary::-webkit-details-marker{display:none}
  .sum-main{display:flex; justify-content:space-between; align-items:baseline; gap:10px}
  .d-date{font-weight:700}
  .d-net{font-weight:800; font-size:17px}
  .sum-sub{display:flex; justify-content:space-between; gap:10px; font-size:13px; color:var(--muted); margin-top:3px}
  details.day>div.entries{padding:2px 14px 12px; border-top:1px solid var(--border)}

  .period{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:13px 14px; margin-bottom:10px}
  .p-head{display:flex; justify-content:space-between; align-items:baseline; gap:10px}
  .p-label{font-weight:700}
  .p-net{font-weight:800; font-size:18px}
  .p-sub{display:flex; justify-content:space-between; gap:10px; font-size:13px; color:var(--muted); margin-top:3px}

  .field{display:flex; flex-direction:column; gap:6px; font-size:14px; font-weight:600; margin-bottom:14px}
  .btn{display:block; width:100%; border:none; border-radius:12px; padding:13px; font:inherit; font-weight:700; cursor:pointer; background:var(--accent); color:#fff; margin-top:6px}
  .btn.secondary{background:var(--accent-weak); color:var(--accent)}
  .btn.danger{background:transparent; color:var(--neg); border:1px solid var(--neg)}
  .btn:active{transform:scale(.99)}
  .note{font-size:13px; color:var(--muted); margin:0 0 12px}
  .foot{text-align:center; color:var(--muted); font-size:12px; padding:12px}

  nav.tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:20;
    display:flex; background:var(--card); border-top:1px solid var(--border);
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav.tabbar button{
    position:relative;
    flex:1; border:none; background:none; color:var(--muted); cursor:pointer;
    padding:9px 2px 9px; font:inherit; font-size:11px; font-weight:600;
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  nav.tabbar button .ico{font-size:20px; line-height:1}
  nav.tabbar button.active{color:var(--accent); font-weight:800}
  nav.tabbar button.active::before{content:""; position:absolute; top:0; left:26%; right:26%; height:3px; background:var(--accent); border-radius:0 0 3px 3px}

  #toast{
    position:fixed; left:50%; bottom:calc(90px + env(safe-area-inset-bottom)); transform:translateX(-50%);
    background:#1e2330; color:#fff; padding:10px 16px; border-radius:12px; font-size:14px;
    opacity:0; pointer-events:none; transition:opacity .25s; z-index:50; max-width:90%;
  }
  #toast.show{opacity:.97}
  #toast button{margin-left:10px; border:none; background:none; color:#8ab4ff; font:inherit; font-weight:700; cursor:pointer; padding:2px 4px}

  /* CSV import modal */
  .csv-modal{position:fixed; inset:0; z-index:100; background:var(--bg); display:flex; flex-direction:column}
  .csv-head{display:flex; align-items:center; gap:10px; padding:calc(env(safe-area-inset-top) + 12px) 14px 12px; border-bottom:1px solid var(--border); background:var(--card)}
  .csv-head .close{border:none; background:var(--track); color:var(--text); width:36px; height:36px; border-radius:50%; font-size:16px; cursor:pointer; flex:0 0 auto}
  .csv-title{font-weight:700; font-size:17px}
  .csv-scroll{flex:1; overflow-y:auto; padding:14px; -webkit-overflow-scrolling:touch}
  .csv-info{font-size:12px; color:var(--muted); margin-bottom:10px; line-height:1.5}
  .csv-map{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px}
  .csv-map label{flex:1; min-width:100px; font-size:12px; color:var(--muted); display:flex; flex-direction:column; gap:4px}
  .csv-map select{font:inherit; font-size:14px; padding:9px; border:1px solid var(--border); border-radius:10px; background:var(--card); color:var(--text); max-width:100%}
  .csv-tools{display:flex; gap:8px; margin-bottom:6px}
  .csv-tools button{flex:1; border:1px solid var(--border); background:var(--card); color:var(--accent); font:inherit; font-weight:600; font-size:13px; padding:10px 4px; border-radius:10px; cursor:pointer}
  .csv-row{display:flex; align-items:center; gap:10px; padding:11px 6px; border-bottom:1px solid var(--border)}
  .csv-row input{width:22px; height:22px; flex:0 0 auto; accent-color:var(--accent)}
  .csv-date{font-size:12px; color:var(--muted); width:56px; flex:0 0 auto}
  .csv-memo{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .csv-amt{font-weight:700; white-space:nowrap}
  .csv-row.disabled{opacity:.45}
  .csv-badge{font-size:10px; color:var(--muted); border:1px solid var(--border); border-radius:6px; padding:1px 5px; flex:0 0 auto}
  .csv-foot{padding:12px 14px calc(env(safe-area-inset-bottom) + 12px); border-top:1px solid var(--border); background:var(--card)}
  .csv-empty{color:var(--muted); text-align:center; padding:26px 10px; line-height:1.7}
</style>
</head>
<body>
<header>
  <div class="brand">🍚 食費家計簿</div>
  <div class="today-date" id="headerDate"></div>
</header>

<main>
  <section id="tab-today">
    <div id="todayStats"></div>
    <form id="addForm" class="add-form" autocomplete="off">
      <div class="row">
        <input id="amt" type="number" inputmode="numeric" min="1" step="1" placeholder="金額" aria-label="金額（円）" required>
        <input id="memo" type="text" placeholder="メモ（任意）例: 昼食" aria-label="メモ">
        <button type="submit" class="btn-add">追加</button>
      </div>
      <div class="row2">
        <label>日付 <input id="date" type="date"></label>
        <span id="formMsg" class="msg"></span>
      </div>
    </form>
    <div id="todayEntries"></div>
  </section>

  <section id="tab-daily" hidden></section>
  <section id="tab-weekly" hidden></section>
  <section id="tab-monthly" hidden></section>
  <section id="tab-settings" hidden></section>
</main>

<nav class="tabbar" role="tablist" aria-label="表示切り替え">
  <button data-tab="today" role="tab" aria-selected="true"><span class="ico">📅</span>今日</button>
  <button data-tab="daily" role="tab" aria-selected="false"><span class="ico">🗓️</span>日別</button>
  <button data-tab="weekly" role="tab" aria-selected="false"><span class="ico">📆</span>週別</button>
  <button data-tab="monthly" role="tab" aria-selected="false"><span class="ico">📊</span>月別</button>
  <button data-tab="settings" role="tab" aria-selected="false"><span class="ico">⚙️</span>設定</button>
</nav>

<input type="file" id="importFile" accept="application/json,.json" hidden>
<input type="file" id="csvFile" accept=".csv,text/csv,text/comma-separated-values,application/vnd.ms-excel" hidden>
<div id="toast"></div>

<script>
"use strict";
const KEY = "foodBudget.v1";
const el = id => document.getElementById(id);
let currentTab = "today";
let state = load();

/* ---------- persistence ---------- */
function load(){
  try{ const raw = localStorage.getItem(KEY); if(raw) return sanitize(JSON.parse(raw)); }catch(e){}
  return { dailyAllowance:1500, startDate:null, syncUrl:"", entries:[] };
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); return true; }catch(e){ toast("保存できませんでした（端末の空き容量をご確認ください）"); return false; } }
function isSyncUrl(u){ try{ const p=new URL(u); return p.protocol==="https:" && p.hostname==="script.google.com"; }catch(e){ return false; } }
function uid(){ try{ return crypto.randomUUID(); }catch(e){ return String(Date.now())+"-"+Math.random().toString(16).slice(2); } }

function sanitize(o){
  // Reject anything that is not a recognizable backup so callers can distinguish
  // "corrupt / wrong file" from "empty valid backup" (prevents silently wiping data on import).
  if(!o || typeof o!=="object" || Array.isArray(o) || !Array.isArray(o.entries))
    throw new Error("not a valid backup");
  const today = todayStr();
  const out = { dailyAllowance:1500, startDate:null, syncUrl:"", entries:[] };
  if(typeof o.dailyAllowance==="number" && isFinite(o.dailyAllowance) && o.dailyAllowance>0) out.dailyAllowance = Math.round(o.dailyAllowance);
  if(isValidDate(o.startDate) && o.startDate<=today) out.startDate = o.startDate;
  // syncUrl はレスポンスがJSとして実行される(JSONP)ため、自分のApps Script(https+script.google.com)以外は破棄する
  if(typeof o.syncUrl==="string" && o.syncUrl.length<=2000 && isSyncUrl(o.syncUrl)) out.syncUrl = o.syncUrl;
  const seen = new Set();
  for(const e of o.entries){
    if(e && isValidDate(e.date) && e.date<=today && typeof e.amount==="number" && isFinite(e.amount) && e.amount>0){
      let id = (typeof e.id==="string" && e.id && !seen.has(e.id)) ? e.id : uid();
      while(seen.has(id)) id = uid();
      seen.add(id);
      const ent = {
        id,
        date: e.date,
        amount: Math.round(e.amount),
        memo: typeof e.memo==="string" ? e.memo : "",
        ts: (typeof e.ts==="number" && isFinite(e.ts)) ? e.ts : 0
      };
      if(typeof e.src==="string" && e.src) ent.src = e.src;   // keep card-sync source id (dedupe)
      out.entries.push(ent);
    }
  }
  return out;
}

/* ---------- date helpers (local time) ---------- */
function pad(n){ return String(n).padStart(2,"0"); }
function fmt(dt){ return dt.getFullYear()+"-"+pad(dt.getMonth()+1)+"-"+pad(dt.getDate()); }
function todayStr(){ return fmt(new Date()); }
function parseD(s){ const p = s.split("-"); return new Date(+p[0], +p[1]-1, +p[2]); }
function addDays(s,n){ const dt = parseD(s); dt.setDate(dt.getDate()+n); return fmt(dt); }
const WD = "日月火水木金土";
function wd(s){ return WD[parseD(s).getDay()]; }
function fmtMD(s){ const p = s.split("-"); return (+p[1])+"/"+(+p[2]); }
function isValidDate(s){
  if(typeof s!=="string" || !/^\d{4}-\d{2}-\d{2}$/.test(s)) return false;
  const p = s.split("-").map(Number);
  const dt = new Date(p[0], p[1]-1, p[2]);
  return dt.getFullYear()===p[0] && dt.getMonth()===p[1]-1 && dt.getDate()===p[2];
}

/* ---------- core budget model ---------- */
function startDate(){
  let earliest = null;
  for(const e of state.entries){ if(earliest===null || e.date<earliest) earliest = e.date; }
  let s = state.startDate || earliest || todayStr();
  if(earliest && earliest<s) s = earliest;   // never orphan an earlier entry
  return s;
}
function entriesByDate(){
  const m = {};
  for(const e of state.entries){ (m[e.date] = m[e.date] || []).push(e); }
  for(const k in m) m[k].sort((a,b)=> (a.ts||0)-(b.ts||0));
  return m;
}
// One row per calendar day from start to (today or latest entry). Allowance accrues only up to today.
function dailySeries(){
  let start = startDate();
  const today = todayStr();
  const floor = addDays(today, -3660);   // ~10 years back: bounds render size, keeps today in range
  if(start < floor) start = floor;
  let end = today;
  for(const e of state.entries){ if(e.date>end) end = e.date; }
  const spent = {};
  for(const e of state.entries){ spent[e.date] = (spent[e.date]||0) + e.amount; }
  const out = []; let cum = 0; let guard = 0;
  for(let d = start; d<=end && guard<20000; d = addDays(d,1), guard++){
    const sp = spent[d] || 0;
    const allow = (d<=today) ? state.dailyAllowance : 0;
    const net = allow - sp;
    cum += net;
    out.push({ date:d, spent:sp, allowance:allow, net, cum });
  }
  return out;
}
function groupBy(days, keyFn){
  const map = new Map();
  for(const d of days){
    const k = keyFn(d.date);
    if(!map.has(k)) map.set(k, { key:k, allowance:0, spent:0, net:0, cum:d.cum });
    const g = map.get(k);
    g.allowance += d.allowance; g.spent += d.spent; g.net += d.net; g.cum = d.cum; // cum = last day in group
  }
  return [...map.values()].sort((a,b)=> a.key<b.key ? -1 : 1);
}
function weekKey(dateStr){ const dow = (parseD(dateStr).getDay()+6)%7; return addDays(dateStr, -dow); } // Monday start
function weekly(){ return groupBy(dailySeries(), weekKey); }
function monthly(){ return groupBy(dailySeries(), d => d.slice(0,7)); }

function y(n){ return "¥" + Math.round(n).toLocaleString("ja-JP"); }
function signed(n){ n = Math.round(n); const s = n>0?"+":n<0?"−":"±"; return s+"¥"+Math.abs(n).toLocaleString("ja-JP"); }
function cls(n){ return n>0?"pos":n<0?"neg":"zero"; }
function niceDate(s){ const p = s.split("-"); return (+p[0])+"年"+(+p[1])+"月"+(+p[2])+"日("+wd(s)+")"; }

let lastCsvEncoding = "";
function decodeBuffer(bytes){
  if(bytes.length>=3 && bytes[0]===0xEF && bytes[1]===0xBB && bytes[2]===0xBF){ lastCsvEncoding="UTF-8"; return new TextDecoder("utf-8").decode(bytes); }
  // Valid UTF-8 (no BOM) decodes cleanly; Shift-JIS byte streams almost always fail strict UTF-8.
  try{ const u=new TextDecoder("utf-8",{fatal:true}).decode(bytes); lastCsvEncoding="UTF-8"; return u; }catch(e){}
  try{ const s=new TextDecoder("shift_jis").decode(bytes); lastCsvEncoding="Shift-JIS"; return s; }catch(e){}
  lastCsvEncoding="UTF-8"; return new TextDecoder("utf-8",{fatal:false}).decode(bytes);
}
function parseCsvRows(text){
  text = text.replace(/^﻿/, "");
  const rows=[]; let row=[], field="", inq=false, i=0;
  while(i<text.length){
    const c=text[i];
    if(inq){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i+=2; continue; } inq=false; i++; continue; }
      field+=c; i++; continue;
    }
    if(c==='"'){ inq=true; i++; continue; }
    if(c===','){ row.push(field); field=""; i++; continue; }
    if(c==='\r'){ i++; continue; }
    if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=""; i++; continue; }
    field+=c; i++;
  }
  row.push(field); rows.push(row);
  return rows.filter(r => r.some(x => x.trim()!==""));
}
function parseDateCell(s){
  s=(s||"").replace(/[０-９]/g, d=>String.fromCharCode(d.charCodeAt(0)-0xFEE0)).replace(/／/g,"/").trim();
  const m=s.match(/(\d{4})[\/\-.年](\d{1,2})[\/\-.月](\d{1,2})/);
  if(!m) return null;
  const y=+m[1], mo=+m[2], d=+m[3];
  const dt=new Date(y,mo-1,d);
  if(dt.getFullYear()!==y||dt.getMonth()!==mo-1||dt.getDate()!==d) return null;
  return y+"-"+pad(mo)+"-"+pad(d);
}
function parseAmountCell(s){
  s=(s||"").replace(/[０-９]/g, d=>String.fromCharCode(d.charCodeAt(0)-0xFEE0));
  s=s.replace(/[▲△]/g,"-").replace(/[－−]/g,"-").replace(/＋/g,"+");   // accounting/full-width sign
  s=s.replace(/[¥￥,，、\s円　]/g,"");
  if(!/^[+\-]?\d+$/.test(s)) return null;
  return parseInt(s,10);
}
function detectColumns(rows){
  const ncol=rows.reduce((m,r)=>Math.max(m,r.length),0);
  let dateCol=-1, dbest=-1; const amt=[], desc=[];
  for(let c=0;c<ncol;c++){
    let dHits=0, aHits=0, aSum=0, aN=0, tLen=0, tN=0;
    for(const r of rows){
      const cell=r[c]||"";
      if(parseDateCell(cell)) dHits++;
      const a=parseAmountCell(cell);
      if(a!=null){ aHits++; aSum+=Math.abs(a); aN++; }
      const t=cell.trim();
      if(t && !parseDateCell(cell) && parseAmountCell(cell)==null){ tLen+=t.length; tN++; }
    }
    if(dHits>dbest){ dbest=dHits; dateCol=c; }
    amt[c]={hits:aHits, avg: aN? aSum/aN : 0};
    desc[c]= tN? tLen/tN : 0;
  }
  if(dbest<=0) dateCol=-1;                                   // no real date column
  let amtCol=-1, abest=-1;
  for(let c=0;c<ncol;c++){ if(c===dateCol) continue; const s=amt[c]; const v=s.hits + Math.min(s.avg/1000,5); if(s.hits>0 && v>abest){ abest=v; amtCol=c; } }
  let descCol=-1, cbest=-1;
  for(let c=0;c<ncol;c++){ if(c===dateCol||c===amtCol) continue; if(desc[c]>cbest){ cbest=desc[c]; descCol=c; } }
  return {ncol, dateCol, amtCol, descCol};                   // descCol may be -1 (=> empty memo)
}
function buildCandidates(rows, map){
  const out=[];
  const useDesc = map.descCol>=0 && map.descCol!==map.dateCol && map.descCol!==map.amtCol;
  for(const r of rows){
    const date=parseDateCell(r[map.dateCol]||"");
    const rawAmt=parseAmountCell(r[map.amtCol]||"");
    if(!date || rawAmt==null) continue;
    if(rawAmt<=0) continue;                        // skip refunds/credits/payments — import only positive charges
    const memo=useDesc ? (r[map.descCol]||"").trim() : "";
    out.push({date, amount:rawAmt, memo});
  }
  return out;
}
const FOOD_KW=["コンビニ","セブン","ｾﾌﾞﾝ","ローソン","ﾛｰｿﾝ","ファミリーマート","ﾌｧﾐﾘｰﾏｰﾄ","ファミマ","ミニストップ","デイリー","スーパー","ｽｰﾊﾟｰ","イオン","ｲｵﾝ","まいばす","成城石井","ライフ","マルエツ","西友","業務スーパー","オーケー","マクドナルド","ﾏｸﾄﾞﾅﾙﾄﾞ","マック","モスバーガー","バーガー","ケンタッキー","スターバックス","ｽﾀｰﾊﾞｯｸｽ","スタバ","ドトール","タリーズ","コメダ","カフェ","ｶﾌｪ","珈琲","コーヒー","レストラン","ﾚｽﾄﾗﾝ","食堂","飲食","居酒屋","牛丼","吉野家","松屋","すき家","なか卯","丸亀","はなまる","ラーメン","そば","うどん","寿司","焼肉","弁当","惣菜","ベーカリー","パン","ﾊﾟﾝ","サイゼ","ガスト","デリ","フード","ﾌｰﾄﾞ","キッチン","ダイニング","cafe","coffee","restaurant","mcdonald","starbucks","ubereats","uber eats","出前館","doordash","wolt"];
function looksFood(memo){ const m=(memo||"").toLowerCase(); return FOOD_KW.some(k=> memo.includes(k) || m.includes(k.toLowerCase())); }
function entryKey(e){ return e.date+"|"+e.amount+"|"+String(e.memo||"").replace(/\s+/g,""); }

let csvState = null;
function openCsvFile(file){
  if(file.size > 8*1024*1024){ toast("ファイルが大きすぎます（8MBまで）"); return; }
  const r=new FileReader();
  r.onload=()=>{
    try{
      const text=decodeBuffer(new Uint8Array(r.result));
      const rows=parseCsvRows(text);
      if(!rows.length){ toast("読み取れる明細がありませんでした"); return; }
      const map=detectColumns(rows);
      if(map.dateCol<0 || map.amtCol<0){ toast("日付・金額の列を判別できませんでした"); return; }
      csvState={ rows, map, encoding:lastCsvEncoding, cands:[] };
      openCsvModal();
    }catch(e){ toast("CSVの読み込みに失敗しました"); }
  };
  r.onerror=()=>toast("CSVの読み込みに失敗しました");
  r.readAsArrayBuffer(file);
}
function recomputeCands(prevChecked){
  const cands=buildCandidates(csvState.rows, csvState.map);
  // multiplicity-aware dedupe（各既存エントリは1候補にのみ対応）:
  //  - 手入力/CSV由来（srcなし）は date|amount|memo の完全キーで照合
  //  - 自動同期由来（srcあり）は店名表記がCSVと揃わないため date|amount で照合
  const counts={}, syncDA={};
  for(const e of state.entries){
    if(e.src){ const dk=e.date+"|"+e.amount; syncDA[dk]=(syncDA[dk]||0)+1; }
    else { const k=entryKey(e); counts[k]=(counts[k]||0)+1; }
  }
  const start=startDate(), today=todayStr();
  csvState.cands=cands.map(c=>{
    const k=entryKey(c);
    let dup=false;
    if((counts[k]||0)>0){ dup=true; counts[k]--; }
    else { const dk=c.date+"|"+c.amount; if((syncDA[dk]||0)>0){ dup=true; syncDA[dk]--; } }
    const inRange = c.date>=start && c.date<=today;
    const food=looksFood(c.memo);
    return { date:c.date, amount:c.amount, memo:c.memo, dup, inRange, food, checked:(food && !dup && inRange) };
  });
  if(prevChecked && prevChecked.length===csvState.cands.length){          // keep selections across a column re-map
    csvState.cands.forEach((c,i)=>{ c.checked = (!c.dup && c.inRange) && prevChecked[i]; });
  }
}
function colOptions(sel, includeNone){
  const sampleRow = csvState.rows.find(r=> parseDateCell(r[csvState.map.dateCol])) || csvState.rows[0] || [];
  let html = includeNone ? '<option value="-1"'+(sel<0?" selected":"")+'>（メモなし）</option>' : "";
  for(let c=0;c<csvState.map.ncol;c++){
    const s=((sampleRow[c]||"").trim()).slice(0,12);
    html+='<option value="'+c+'"'+(c===sel?" selected":"")+'>列'+(c+1)+(s?"："+esc(s):"")+'</option>';
  }
  return html;
}
function openCsvModal(){
  recomputeCands();
  const m=document.createElement("div");
  m.id="csvModal"; m.className="csv-modal";
  m.innerHTML =
    '<div class="csv-head"><button class="close" id="csvClose" aria-label="閉じる">✕</button><div class="csv-title">カード明細を取り込み</div></div>'+
    '<div class="csv-scroll">'+
      '<div class="csv-info" id="csvInfo"></div>'+
      '<div class="csv-map">'+
        '<label>日付の列<select id="mapDate"></select></label>'+
        '<label>金額の列<select id="mapAmt"></select></label>'+
        '<label>店名の列<select id="mapDesc"></select></label>'+
      '</div>'+
      '<div class="csv-tools"><button data-csv="food">食費だけ選択</button><button data-csv="all">全選択</button><button data-csv="none">全解除</button></div>'+
      '<div id="csvList"></div>'+
    '</div>'+
    '<div class="csv-foot"><button class="btn" id="csvImport">取り込む</button></div>';
  document.body.appendChild(m);
  el("mapDate").innerHTML=colOptions(csvState.map.dateCol);
  el("mapAmt").innerHTML=colOptions(csvState.map.amtCol);
  el("mapDesc").innerHTML=colOptions(csvState.map.descCol, true);
  el("csvClose").onclick=closeCsvModal;
  el("csvImport").onclick=csvImportSelected;
  const remap=()=>{ const prev=csvState.cands.map(c=>c.checked); csvState.map.dateCol=+el("mapDate").value; csvState.map.amtCol=+el("mapAmt").value; csvState.map.descCol=+el("mapDesc").value; recomputeCands(prev); renderCsvList(); };
  el("mapDate").onchange=remap; el("mapAmt").onchange=remap; el("mapDesc").onchange=remap;
  m.querySelectorAll(".csv-tools button").forEach(b=> b.onclick=()=>{
    const w=b.dataset.csv;
    csvState.cands.forEach(c=>{ if(c.dup||!c.inRange){ c.checked=false; return; } c.checked = w==="all" ? true : w==="none" ? false : c.food; });
    renderCsvList();
  });
  el("csvList").addEventListener("change", e=>{
    const cb=e.target.closest("input[type=checkbox]"); if(!cb) return;
    const i=+cb.dataset.idx, c=csvState.cands[i];
    if(c && !c.dup && c.inRange) c.checked=cb.checked;
    updateCsvFooter();
  });
  renderCsvList();
}
function renderCsvList(){
  const cs=csvState.cands;
  const outCount=cs.filter(c=>!c.inRange).length, dupCount=cs.filter(c=>c.dup).length;
  const importable=cs.filter(c=>!c.dup && c.inRange).length;
  el("csvInfo").textContent = cs.length+"件を検出（文字コード "+csvState.encoding+"）"
    + (dupCount? " ・ 取込済み"+dupCount+"件":"")
    + (outCount? " ・ 起算日("+fmtMD(startDate())+")より前/未来の"+outCount+"件は対象外":"");
  const note = (cs.length && importable===0)
    ? '<div class="csv-empty">'+(dupCount===cs.length ? "すべて取込済みです。" : "取り込める明細がありません（対象期間外）。<br>必要なら設定で「記録の開始日」を早めてください。")+'</div>'
    : "";
  el("csvList").innerHTML = cs.length ? note + cs.map((c,i)=>
    '<label class="csv-row'+((c.dup||!c.inRange)?" disabled":"")+'">'+
      '<input type="checkbox" data-idx="'+i+'"'+(c.checked?" checked":"")+((c.dup||!c.inRange)?" disabled":"")+'>'+
      '<span class="csv-date">'+fmtMD(c.date)+'('+wd(c.date)+')</span>'+
      '<span class="csv-memo">'+esc(c.memo||"(店名なし)")+'</span>'+
      '<span class="csv-amt">'+y(c.amount)+'</span>'+
      (c.dup?'<span class="csv-badge">取込済み</span>':(!c.inRange?'<span class="csv-badge">対象外</span>':""))+
    '</label>'
  ).join("") : '<div class="csv-empty">取り込める明細が見つかりませんでした。<br>上の「日付／金額／店名の列」を選び直してみてください。</div>';
  updateCsvFooter();
}
function updateCsvFooter(){
  const chosen=csvState.cands.filter(c=>c.checked && !c.dup && c.inRange);
  const total=chosen.reduce((s,c)=>s+c.amount,0);
  const btn=el("csvImport");
  btn.textContent = chosen.length ? "選択した "+chosen.length+"件（"+y(total)+"）を取り込む" : "取り込む項目を選んでください";
  btn.disabled = chosen.length===0;
}
function csvImportSelected(){
  const chosen=csvState.cands.filter(c=>c.checked && !c.dup && c.inRange);
  if(!chosen.length) return;
  const t0=Date.now();
  chosen.forEach((c,k)=> state.entries.push({ id:uid(), date:c.date, amount:c.amount, memo:c.memo, ts:t0+k }));
  if(!save()){ state.entries.splice(state.entries.length-chosen.length, chosen.length); return; }
  closeCsvModal();
  render();
  toast(chosen.length+"件を取り込みました");
}
function closeCsvModal(){ const m=el("csvModal"); if(m) m.remove(); csvState=null; }

/* ========== auto-sync (food-only card statement via Apps Script, JSONP) ========== */
let syncing=false, lastSyncMsg="";
function nowHM(){ const d=new Date(); return pad(d.getHours())+":"+pad(d.getMinutes()); }
function syncNow(manual){
  const url=(state.syncUrl||"").trim();
  if(!url){ if(manual) toast("同期URLが未設定です"); return; }
  if(syncing) return;
  syncing=true;
  const cb="__sync_"+Date.now();
  const s=document.createElement("script");
  let done=false;
  const cleanup=()=>{ try{ delete window[cb]; }catch(e){ window[cb]=undefined; } if(s.parentNode) s.parentNode.removeChild(s); syncing=false; };
  const timer=setTimeout(()=>{ if(done) return; done=true; cleanup(); if(manual) toast("同期に失敗しました（タイムアウト）"); }, 15000);
  window[cb]=res=>{ if(done) return; done=true; clearTimeout(timer); cleanup(); handleSyncResult(res, manual); };
  s.onerror=()=>{ if(done) return; done=true; clearTimeout(timer); cleanup(); if(manual) toast("同期に失敗しました（URLをご確認ください）"); };
  s.src = url + (url.indexOf("?")>=0?"&":"?") + "callback=" + cb + "&_t=" + Date.now();
  document.body.appendChild(s);
}
function handleSyncResult(res, manual){
  if(el("csvModal")) return;  // CSVモーダルの重複判定スナップショットを無効化しないよう、開いている間は反映しない（次の同期で取り込まれる）
  if(!res || res.ok!==true || !Array.isArray(res.transactions)){ if(manual) toast("同期に失敗しました"+(res && res.error ? "："+res.error : "")); return; }
  const haveSrc=new Set(state.entries.map(e=>e.src).filter(Boolean));
  // 手入力/CSV取り込み分（srcなし）とは date+金額 で照合し、同じ買い物の二重計上を防ぐ（件数ぶんだけ消費）
  const daCounts={};
  for(const e of state.entries){ if(!e.src){ const k=e.date+"|"+e.amount; daCounts[k]=(daCounts[k]||0)+1; } }
  const start=startDate(), today=todayStr(), before=state.entries.length, t0=Date.now();
  let added=0;
  res.transactions.forEach((tx,k)=>{
    if(!tx || typeof tx.id!=="string" || haveSrc.has(tx.id)) return;
    if(!isValidDate(tx.date) || tx.date<start || tx.date>today) return;
    const amount=Math.round(Number(tx.amount));
    if(!Number.isFinite(amount) || amount<=0) return;
    const dk=tx.date+"|"+amount;
    if((daCounts[dk]||0)>0){ daCounts[dk]--; return; }   // すでに手入力/CSVで記録済みとみなす
    state.entries.push({ id:uid(), date:tx.date, amount, memo:(typeof tx.memo==="string" && tx.memo)?tx.memo:"カード", ts:t0+k, src:tx.id });
    haveSrc.add(tx.id); added++;
  });
  if(added>0 && !save()){ state.entries.length=before; return; }   // rollback if storage fails
  lastSyncMsg="最終同期 "+nowHM()+"（新規 "+added+"件）";
  const st=el("syncStatus"); if(st) st.textContent=lastSyncMsg;
  if(added>0 && currentTab!=="settings") render();   // 設定タブ編集中はフォームをinnerHTMLで作り直さない（入力消失防止）
  if(manual) toast(added>0 ? added+"件を同期しました" : "新しい明細はありません");
}
function saveSync(){
  const u=el("setSyncUrl").value.trim();
  if(u && !isSyncUrl(u)){ toast("Apps ScriptのURL（https://script.google.com/…）を入れてください"); return; }
  const prev=state.syncUrl; state.syncUrl=u;
  if(!save()){ state.syncUrl=prev; return; }
  toast(u ? "保存しました" : "同期URLを消去しました");
  renderSettings();
  if(u) syncNow(true);
}

/* ---------- wiring ---------- */
el("addForm").addEventListener("submit", e=>{ e.preventDefault(); addEntry(); });
el("csvFile").addEventListener("change", e=>{ const f=e.target.files && e.target.files[0]; if(f) openCsvFile(f); e.target.value=""; });
el("importFile").addEventListener("change", e=>{
  const f = e.target.files && e.target.files[0]; if(!f){ return; }
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const next = sanitize(JSON.parse(r.result));   // throws if the file is not a valid backup
      if(!next.syncUrl) next.syncUrl = state.syncUrl;  // バックアップにはURLが入っていないため、この端末の同期設定は引き継ぐ
      if(state.entries.length && !confirm("いまの記録（"+state.entries.length+"件）を、読み込むデータ（"+next.entries.length+"件）で置き換えます。よろしいですか？")) return;
      const prev = state;
      state = next;
      if(!save()){ state = prev; return; }
      render(); toast("読み込みました（"+next.entries.length+"件）");
    }catch(err){
      toast("このファイルは家計簿のバックアップではないようです");
    }finally{ e.target.value=""; }
  };
  r.onerror = ()=>{ toast("読み込みに失敗しました"); e.target.value=""; };
  r.readAsText(f);
});
document.addEventListener("click", e=>{
  const nav = e.target.closest("nav.tabbar button");
  if(nav){ show(nav.dataset.tab); return; }
  const b = e.target.closest("[data-action]");
  if(!b) return;
  const a = b.dataset.action;
  if(a==="del") delEntry(b.dataset.id);
  else if(a==="saveSettings") saveSettings();
  else if(a==="export") exportData();
  else if(a==="import") el("importFile").click();
  else if(a==="importCsv") el("csvFile").click();
  else if(a==="saveSync") saveSync();
  else if(a==="syncNow") syncNow(true);
  else if(a==="reset") resetData();
});

/* Re-sync "today" when the app regains focus (handles crossing midnight while open). */
function onWake(){ if(el("csvModal")) return; if(currentTab==="today") refreshDate(); if(state.syncUrl) syncNow(false); if(currentTab!=="settings") render(); }  // 設定編集中に入力欄を作り直さない
window.addEventListener("focus", onWake);
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) onWake(); });

/* ---------- init ---------- */
const DEFAULT_START = "2026-07-01";                                 // 記録の起算日（1日1500円の開始日）
if(!state.startDate){ state.startDate = DEFAULT_START; save(); }    // 初回起動は7/1から
else if(!state.entries.length && state.startDate > DEFAULT_START){ state.startDate = DEFAULT_START; save(); } // まだ記録が無い端末は7/1に揃える
refreshDate();
show("today");
if(state.syncUrl) syncNow(false);                                             // sync on launch if configured
setInterval(()=>{ if(state.syncUrl && !document.hidden && !el("csvModal")) syncNow(false); }, 60000);  // and ~every minute
</script>
